<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="Test.css">

</head>

<body>

  <!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <h2>Expense Tracker</h2>

    <div class="nav-menu">
      <button class="nav-link active" data-page="home">Home</button>
      <button class="nav-link" data-page="report">Report</button>
    </div>
  </div>
  
  <div class="nav-right">
    <!-- THEME TOGGLE CONTAINER -->
    <div class="theme-wrapper">
      <i class="fas fa-sun icon-sun"></i> <!-- Ikon Matahari -->
      
      <label class="switch">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
      </label>
      
      <i class="fas fa-moon icon-moon"></i> <!-- Ikon Bulan -->
    </div>
  </div>
</nav>

  <!-- MAIN CONTENT -->
  <div class="container">

    <!-- HOME PAGE -->
    <section id="home" class="page active">

      <!-- BALANCE -->
      <div class="balance-container">
        <h2>Total Balance</h2>
        <p id="balance">Rp 0</p>
      </div>

      <!-- FORM -->
      <div class="form-container">
        <h3>Add Transaction</h3>

        <form id="form">
          <input type="text" id="name" placeholder="Item Name" required>
          <input type="number" id="amount" placeholder="Amount" required>

          <select id="category" required>
            <option value="">Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>

          <button type="submit">Add</button>
        </form>
      </div>

      <!-- LIST -->
      <div class="list-container">
        <h3>Transaction History</h3>
        <ul id="list"></ul>
      </div>

    </section>

    <!-- REPORT PAGE -->
    <section id="report" class="page">

      <div class="chart-container">
        <h3>Spending Chart</h3>
        <canvas id="chart"></canvas>
      </div>

    </section>

  </div>

  <script src="test.js"></script>
</body>
</html>
