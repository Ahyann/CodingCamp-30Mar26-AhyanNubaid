<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  
  <link rel="icon" href="LOGO.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/Expense.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <nav class="navbar">
      <div class="nav-left">
          <h2>
              <img src="LOGO.png" alt="Logo" class="nav-logo">
              Ahyan's Expense Tracker
          </h2>
      </div>
      
      <div class="nav-right">
          <div class="nav-menu">
              <button class="nav-link active" data-page="home">Home</button>
              <button class="nav-link" data-page="report">Report</button>
          </div>
          
          <div class="theme-wrapper">
            <i class="fas fa-sun icon-sun"></i>
            <label class="switch">
              <input type="checkbox" id="theme-toggle">
              <span class="slider"></span>
            </label>
            <i class="fas fa-moon icon-moon"></i>
          </div>
      </div>
  </nav>

  <div class="container">
    
    <section id="home">
      <div class="balance-container">
        <h2>Total Balance</h2>
        <p id="balance">Rp 0</p>
      </div>

      <div class="form-container">
        <h3>Add Transaction</h3>
        <form id="form">
          <input type="text" id="name" placeholder="Item Name" required>
          <input type="number" id="amount" placeholder="Amount" required>
          <input type="date" id="date" required> 
          <select id="category" required>
            <option value="">Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <button type="submit">Add</button>
        </form>
      </div>

      <div class="list-container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3>Transaction History</h3>
          <input type="month" id="historyMonthFilter" class="history-filter">
        </div>
        
        <div class="carousel-wrapper">
          <button class="scroll-btn left-btn" id="scrollLeft"><i class="fas fa-chevron-left"></i></button>
          <ul id="list"></ul>
          <button class="scroll-btn right-btn" id="scrollRight"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
    </section>

    <section id="report">
      <div class="report-header">
        <h2>Report & Statistics</h2>
        <p>Your spending summary</p>
        
        <div class="month-filter-container">
          <input type="month" id="monthFilter">
        </div>
        <h3 class="monthly-total">Monthly Total: <span id="monthlyBalance">Rp 0</span></h3>
      </div>

      <div class="chart-container">
        <div class="report-controls">
          <label for="sortOrder" style="font-size: 14px; color:#555;">Filter:</label>
          <select id="sortOrder">
            <optgroup label="All Categories">
              <option value="all-desc">Highest Amount</option>
              <option value="all-asc">Lowest Amount</option>
            </optgroup>
            <optgroup label="Filter by Category">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </optgroup>
          </select>
        </div>
        
        <div style="position: relative; height: 250px; width: 100%; display: flex; justify-content: center; margin-bottom: 20px;">
          <canvas id="chart"></canvas>
        </div>

        <div id="categoryBreakdown" class="category-breakdown">
          </div>
      </div>
    </section>

  </div>

  <script src="js/Expense.js"></script>
</body>
</html>
